version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .envs/.env.dev
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .envs/.env.dev
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    command: uv run arq src.workers.main.WorkerSettings
